<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="split-container">
        
        <aside class="left-panel">
            <nav class="social-login">
                <a href="https://www.linkedin.com/signup" class="social-btn">
                    <img src="../assects/LinkedIn.png" alt="LinkedIn" class="icon">
                    Sign up with LinkedIn
                </a>
                <a href="https://x.com/" class="social-btn">
                    <img src="../assects/X_logo.jpg" alt="X" class="icon">
                    Sign up with X
                </a>
                <a href="https://www.facebook.com/reg/" class="social-btn">
                    <img src="../assects/Facebook_f_logo_(2019).svg.png" alt="Facebook" class="icon">
                    Sign up with Facebook
                </a>
            </nav>
        </aside>

        <section class="right-panel">
            <header class="form-header">
                <h1 class="title">Sign Up</h1>
                <p class="subtitle">Get started absolutely free</p>
            </header>

            <form action="#" class="signup-form">
                <p class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </p>
                
                <p class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </p>

                <p class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Creating an account means you're okay with our Terms of Service, Privacy Policy, and default Notification Settings</label>
                </p>

                <button type="submit" class="submit-btn">Sign up</button>
            </form>
        </section>
        
    </main>
</body>
</html>
